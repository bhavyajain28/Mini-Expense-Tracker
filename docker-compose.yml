version: '3.9'

services:
  server:
    build:
      context: ./server
    container_name: expense-tracker-server
    environment:
      - PORT=5000
      - NODE_ENV=development
      - ALLOWED_ORIGIN=http://localhost:5173
    volumes:
      - ./server/src/data:/app/src/data
    ports:
      - "5000:5000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: expense-tracker-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
