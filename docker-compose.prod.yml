version: '3.9'

services:
  server:
    build:
      context: ./server
    container_name: expense-tracker-server
    environment:
      - PORT=5000
      - NODE_ENV=production
      - ALLOWED_ORIGIN=${CLIENT_URL}
    volumes:
      - expense_data:/app/src/data
    ports:
      - "5000:5000"
    restart: always

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${API_URL}
    container_name: expense-tracker-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  expense_data:
